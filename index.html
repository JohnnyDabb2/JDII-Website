    .grid {
      display: grid;

      margin-top: 10px;

    .icon-card {
      background: #1f2937;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #f9fafb;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .icon-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      background: #111827;
    }

    .icon-circle {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 8px;
	  overflow: hidden;
    }
	
	.icon-circle img {
	  width: 100%;
	  height: 100%;
	  object-fit: cover;
	}

    .icon-label {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.9;
    }
  </style>
